<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Dashboard | Vlad</title>
  <style>
    #analytics-link {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 9999;
      background: #16342a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      padding: 9px 16px;
      border-radius: 999px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    #analytics-link:hover { background: #0f241d; }
  </style>
</head>
<body>
  <a id="analytics-link" href="/analytics/" target="_blank" rel="noopener">📊 Analytics</a>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Make the live preview inside the editor use the real site styles,
    // so what you see while writing is what readers see.
    CMS.registerPreviewStyle("/css/style.css");
    CMS.registerPreviewStyle(
      ".frame-content { background: #f8f4ec; padding: 40px; } " +
      ".frame-content > div { max-width: 700px; margin: 0 auto; }",
      { raw: true }
    );
  </script>
</body>
</html>
